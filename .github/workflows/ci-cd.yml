name: Flask CI/CD Pipeline

on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:

# ---------------- CI ----------------
  ci:
    runs-on: ubuntu-latest
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pylint bandit

    - name: Lint
      run: pylint app.py || true

    - name: Security check
      run: bandit -r . -s B104,B101

    - name: Run tests
      run: pytest -v


# ---------------- STAGING ----------------
  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

    - name: Deploy to Staging
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
        set -e

        echo "🚀 Starting Staging Deployment"

        APP_DIR="/var/www/flask-app"

        # SAFE CLEAN
        sudo rm -rf $APP_DIR
        sudo mkdir -p $APP_DIR
        sudo chown -R $USER:$USER $APP_DIR

        cd $APP_DIR

        # CLONE
        git clone https://github.com/Avinashsain/flask-ci-cd-app.git .

        # FIXED ENV (IMPORTANT)
        echo "MONGO_URI=${MONGO_URI}" > .env

        # INSTALL SYSTEM DEPENDENCIES
        sudo apt update
        sudo apt install -y python3-venv python3-pip

        # VENV SETUP
        python3 -m venv venv
        source venv/bin/activate

        pip install --upgrade pip
        pip install -r requirements.txt

        # SAFE SERVICE START
        if systemctl list-units --type=service | grep -q flask-app; then
          sudo systemctl restart flask-app
        else
          echo "⚠️ flask-app service not found"
        fi

        echo "✅ Staging Deployment Done"
        EOF


# ---------------- PRODUCTION ----------------
  deploy-production:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

    - name: Deploy to Production
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
        set -e

        echo "🚀 Starting Production Deployment"

        APP_DIR="/var/www/flask-app"

        sudo rm -rf $APP_DIR
        sudo mkdir -p $APP_DIR
        sudo chown -R $USER:$USER $APP_DIR

        cd $APP_DIR

        git clone https://github.com/Avinashsain/flask-ci-cd-app.git .

        echo "MONGO_URI=${MONGO_URI}" > .env

        sudo apt update
        sudo apt install -y python3-venv python3-pip

        python3 -m venv venv
        source venv/bin/activate

        pip install --upgrade pip
        pip install -r requirements.txt

        if systemctl list-units --type=service | grep -q flask-app; then
          sudo systemctl restart flask-app
        else
          echo "⚠️ flask-app service not found"
        fi

        echo "✅ Production Deployment Done"
        EOF