name: Flask CI/CD Pipeline

on:
  push:
    branches: [master, staging]
    tags:
      - "v*"
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:

  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Dev Tools
      run: |
        pip install pylint bandit pytest

    # Linting (optional fail-safe)
    - name: Run Pylint
      run: pylint app.py || true

    # Security Scan (Bandit fixed)
    - name: Run Bandit Security Scan
      run: bandit -r . -s B104,B101

    # Run tests
    - name: Run Pytest
      run: pytest -v


  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

    - name: Deploy to Staging Server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "
          cd /var/www/flask-app &&
          git fetch --all &&
          git reset --hard origin/staging &&
          sudo systemctl restart flask-app
        "


  deploy-production:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

    - name: Deploy to Production Server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} "
          cd /var/www/flask-app &&
          git fetch --all &&
          git reset --hard origin/master &&
          sudo systemctl restart flask-app
        "