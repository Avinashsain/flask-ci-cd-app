name: Flask CI/CD Pipeline

on:
  push:
    branches: [master, staging]
    tags:
      - "v*"
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:

# ---------------- CI PIPELINE ----------------
  ci:
    runs-on: ubuntu-latest
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Dev Tools
      run: |
        pip install pylint bandit pytest

    - name: Run Pylint
      run: pylint app.py || true

    - name: Run Bandit Security Scan
      run: bandit -r . -s B104,B101

    - name: Run Pytest
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: pytest -v


# ---------------- DEPLOY STAGING ----------------
  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to Staging Server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
          set -e

          echo "🚀 Starting Staging Deployment"

          APP_DIR="/var/www/flask-app"

          mkdir -p $APP_DIR
          cd $APP_DIR

          # Fix permissions (important for EC2)
          sudo chown -R $USER:$USER $APP_DIR

          # Clone or update repo safely
          if [ ! -d .git ]; then
            git clone https://github.com/Avinashsain/flask-ci-cd-app.git .
          else
            git fetch --all
            git reset --hard origin/staging
          fi

          # Create .env file safely
          cat > .env <<EOL
          MONGO_URI=${{ secrets.MONGO_URI }}
          EOL

          # Install dependencies
          pip3 install -r requirements.txt

          # Restart service
          sudo systemctl restart flask-app

          echo "✅ Staging Deployment Complete"
        EOF


# ---------------- DEPLOY PRODUCTION ----------------
  deploy-production:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to Production Server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
          set -e

          echo "🚀 Starting Production Deployment"

          APP_DIR="/var/www/flask-app"

          mkdir -p $APP_DIR
          cd $APP_DIR

          sudo chown -R $USER:$USER $APP_DIR

          if [ ! -d .git ]; then
            git clone https://github.com/Avinashsain/flask-ci-cd-app.git .
          else
            git fetch --all
            git reset --hard origin/master
          fi

          cat > .env <<EOL
          MONGO_URI=${{ secrets.MONGO_URI }}
          EOL

          pip3 install -r requirements.txt

          sudo systemctl restart flask-app

          echo "✅ Production Deployment Complete"
        EOF