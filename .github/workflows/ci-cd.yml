name: Flask CI/CD Pipeline

on:
  push:
    branches: [master, staging]

permissions:
  contents: read

jobs:

# ----------- CI -----------
  ci:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    env:
      MONGO_URI: mongodb://localhost:27017/testdb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install & Test
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pylint bandit

          pylint app.py || true
          bandit -r . -s B104,B101
          pytest -v


# ----------- STAGING -----------
  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy Staging
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
          "MONGO_URI='${MONGO_URI}' bash -s" << EOF
          set -e

          APP_DIR="/var/www/flask-app"
          echo "🚀 Staging Deploy"

          sudo rm -rf \$APP_DIR
          sudo mkdir -p \$APP_DIR
          sudo chown -R \$USER:\$USER \$APP_DIR
          cd \$APP_DIR

          git clone -b staging https://github.com/Avinashsain/flask-ci-cd-app.git .

          # ENV
          echo "MONGO_URI=\$MONGO_URI" > .env

          # SYSTEM SETUP
          sudo apt update -y
          sudo apt install -y python3-venv python3-pip nginx

          # VENV
          python3 -m venv venv
          source venv/bin/activate

          pip install --upgrade pip
          pip install -r requirements.txt
          pip install gunicorn

          # SYSTEMD SERVICE
          sudo tee /etc/systemd/system/flask-app.service > /dev/null << 'SERVICE'
          [Unit]
          Description=Flask App
          After=network.target

          [Service]
          User=ubuntu
          WorkingDirectory=/var/www/flask-app
          Environment="PATH=/var/www/flask-app/venv/bin"
          EnvironmentFile=/var/www/flask-app/.env

          ExecStart=/var/www/flask-app/venv/bin/gunicorn \
              --workers 3 \
              --bind 127.0.0.1:5000 \
              app:app

          Restart=always

          [Install]
          WantedBy=multi-user.target
          SERVICE

          # START APP
          sudo systemctl daemon-reload
          sudo systemctl enable flask-app
          sudo systemctl restart flask-app

          # NGINX CONFIG
          sudo tee /etc/nginx/sites-available/flask-app > /dev/null << 'NGINX'
          server {
              listen 80;

              location / {
                  proxy_pass http://127.0.0.1:5000;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
              }
          }
          NGINX

          sudo ln -sf /etc/nginx/sites-available/flask-app /etc/nginx/sites-enabled
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo systemctl restart nginx

          echo "✅ Staging Done"
          EOF


# ----------- PRODUCTION -----------
  deploy-production:
    needs: ci
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Deploy Production
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
          "MONGO_URI='${MONGO_URI}' bash -s" << EOF
          set -e

          APP_DIR="/var/www/flask-app"
          echo "🚀 Production Deploy"

          sudo rm -rf \$APP_DIR
          sudo mkdir -p \$APP_DIR
          sudo chown -R \$USER:\$USER \$APP_DIR
          cd \$APP_DIR

          git clone -b master https://github.com/Avinashsain/flask-ci-cd-app.git .

          echo "MONGO_URI=\$MONGO_URI" > .env

          sudo apt update -y
          sudo apt install -y python3-venv python3-pip nginx

          python3 -m venv venv
          source venv/bin/activate

          pip install --upgrade pip
          pip install -r requirements.txt
          pip install gunicorn

          sudo systemctl daemon-reload
          sudo systemctl enable flask-app
          sudo systemctl restart flask-app

          sudo systemctl restart nginx

          echo "✅ Production Done"
          EOF